<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* 关闭按钮 */
    .close-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .close-btn:hover { background: rgba(255,255,255,0.25); }

    /* 导航箭头 */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border: none;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      opacity: 0.6;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.2); opacity: 1; }
    .nav-btn.prev { left: 20px; }
    .nav-btn.next { right: 20px; }
    .nav-btn:disabled { display: none; }

    /* 图片容器 — 支持缩放 + 拖拽平移 */
    .image-container {
      width: 100%;
      height: 100%;
      padding: 60px 80px;
      overflow: hidden;
      cursor: grab;
      position: relative;
    }
    .image-container.dragging { cursor: grabbing; }
    .image-container .img-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
    }
    .image-container .img-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.5);
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .image-container .img-wrap.zoomed {
      align-items: flex-start;
      justify-content: flex-start;
    }
    .image-container .img-wrap.zoomed img {
      max-width: none;
      max-height: none;
    }

    /* 缩放提示 */
    .zoom-badge {
      position: fixed;
      bottom: 66px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 15;
    }
    .zoom-badge.show { opacity: 1; }

    /* 底部信息栏 */
    .info-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }
    .info-bar .left {
      display: flex;
      align-items: center;
      gap: 16px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }
    .info-bar .left .counter {
      color: #fff;
      font-weight: 600;
    }
    .info-bar .left .dimensions { color: rgba(255,255,255,0.5); }
    .info-bar .left .format-badge {
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      text-transform: uppercase;
    }
    .info-bar .right {
      display: flex;
      gap: 10px;
    }
    .info-bar .right button {
      font-size: 12px;
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-download {
      background: #2563eb;
      color: #fff;
    }
    .btn-download:hover { background: #1d4ed8; }
    .btn-open {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    .btn-open:hover { background: rgba(255,255,255,0.25); }

    @media (max-width: 600px) {
      .image-container { padding: 50px 10px; }
      .nav-btn { width: 36px; height: 36px; font-size: 18px; }
      .nav-btn.prev { left: 6px; }
      .nav-btn.next { right: 6px; }
      .info-bar { flex-direction: column; gap: 8px; align-items: stretch; }
      .info-bar .right { justify-content: center; }
    }
  </style>
</head>
<body>
  <button class="close-btn" id="closeBtn">✕</button>
  <button class="nav-btn prev" id="prevBtn">‹</button>
  <button class="nav-btn next" id="nextBtn">›</button>

  <div class="image-container" id="imageContainer">
    <div class="img-wrap" id="imgWrap">
      <img id="previewImg" src="" alt="预览">
    </div>
  </div>

  <div class="zoom-badge" id="zoomBadge">100%</div>

  <div class="info-bar">
    <div class="left">
      <span class="counter" id="counter">1 / 1</span>
      <span class="dimensions" id="dimensions"></span>
      <span class="format-badge" id="formatBadge"></span>
    </div>
    <div class="right">
      <button class="btn-open" id="zoomResetBtn" style="display:none;">⊡ 适应</button>
      <button class="btn-open" id="openTabBtn">↗ 新标签页打开</button>
      <button class="btn-download" id="downloadBtn">⬇ 下载</button>
    </div>
  </div>

  <script src="preview.js"></script>
</body>
</html>
